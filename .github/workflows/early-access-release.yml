name: Early Access Release

on:
  push:
    branches:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: check
        run: |
          VERSION=$(grep '^version' crates/clust-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version consistency
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          for toml in crates/clust-cli/Cargo.toml crates/clust-hub/Cargo.toml crates/clust-ipc/Cargo.toml; do
            CRATE_VERSION=$(grep '^version' "$toml" | head -1 | sed 's/.*"\(.*\)"/\1/')
            if [ "$CRATE_VERSION" != "$VERSION" ]; then
              echo "::error::Version mismatch: $toml has $CRATE_VERSION but expected $VERSION"
              exit 1
            fi
          done

  build:
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_name: clust-aarch64-apple-darwin.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_name: clust-x86_64-apple-darwin.tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_name: clust-x86_64-unknown-linux-gnu.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev libxdo-dev

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create tarball
        run: |
          tar -czf ${{ matrix.archive_name }} \
            -C target/${{ matrix.target }}/release \
            clust clust-hub

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    outputs:
      sha256_macos_arm64: ${{ steps.shasum.outputs.sha256_macos_arm64 }}
      sha256_macos_x86_64: ${{ steps.shasum.outputs.sha256_macos_x86_64 }}
      sha256_linux_x86_64: ${{ steps.shasum.outputs.sha256_linux_x86_64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256
        id: shasum
        run: |
          echo "sha256_macos_arm64=$(sha256sum clust-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha256_macos_x86_64=$(sha256sum clust-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha256_linux_x86_64=$(sha256sum clust-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Delete existing early release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check-version.outputs.version }}-early"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Pre-Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.check-version.outputs.version }}-early" \
            --title "v${{ needs.check-version.outputs.version }} (early access)" \
            --prerelease \
            --generate-notes \
            clust-aarch64-apple-darwin.tar.gz \
            clust-x86_64-apple-darwin.tar.gz \
            clust-x86_64-unknown-linux-gnu.tar.gz

  update-homebrew:
    needs: [check-version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: clust-ai/homebrew-early
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          SHA256_MACOS_ARM64: ${{ needs.release.outputs.sha256_macos_arm64 }}
          SHA256_MACOS_X86_64: ${{ needs.release.outputs.sha256_macos_x86_64 }}
          SHA256_LINUX_X86_64: ${{ needs.release.outputs.sha256_linux_x86_64 }}
        run: |
          mkdir -p Formula
          cat > Formula/clust.rb << FORMULA
          class Clust < Formula
            desc "Agent manager CLI for AI coding agents (early access)"
            homepage "https://github.com/clust-ai/clust-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/clust-ai/clust-cli/releases/download/v${VERSION}-early/clust-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA256_MACOS_ARM64}"
              end
              on_intel do
                url "https://github.com/clust-ai/clust-cli/releases/download/v${VERSION}-early/clust-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA256_MACOS_X86_64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/clust-ai/clust-cli/releases/download/v${VERSION}-early/clust-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA256_LINUX_X86_64}"
              end
            end

            def install
              bin.install "clust"
              bin.install "clust-hub"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/clust --version")
            end
          end
          FORMULA

      - name: Commit and push
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/clust.rb
          git diff --staged --quiet && exit 0
          git commit -m "clust ${VERSION} early access"
          git push
